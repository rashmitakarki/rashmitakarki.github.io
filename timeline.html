<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Our Journey</title>
  <link rel="stylesheet" href="images/style.css"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💖</text></svg>">
  <style>
    /* Clickable images */
    .tl-img { cursor: zoom-in; position: relative; }
    .tl-img::after{
      content: "Tap";
      position:absolute;
      right:8px;
      bottom:8px;
      font-size:11px;
      padding:6px 8px;
      border-radius:999px;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.14);
      color: rgba(255,255,255,0.88);
      backdrop-filter: blur(10px);
    }

    /* Lightbox */
    .lightbox{
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.82);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 18px;
    }
    .lightbox.show{ display:flex; }

    .lb-card{
      width: min(980px, 96vw);
      max-height: 90vh;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(20, 12, 25, 0.55);
      backdrop-filter: blur(12px);
      box-shadow: 0 24px 80px rgba(0,0,0,0.55);
      position: relative;
    }
    .lb-img{
      width: 100%;
      height: min(72vh, 640px);
      background: rgba(255,255,255,0.06);
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .lb-img img{
      width: 100%;
      height: 100%;
      object-fit: contain;
      display:block;
    }
    .lb-meta{
      padding: 14px 14px 16px;
      color: rgba(255,255,255,0.9);
    }
    .lb-title{ font-weight: 900; font-size: 16px; }
    .lb-sub{ margin-top: 6px; color: rgba(255,255,255,0.75); font-size: 13px; line-height: 1.5; }

    .lb-btn{
      position: absolute;
      top: 12px;
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.35);
      color: rgba(255,255,255,0.9);
      cursor: pointer;
      backdrop-filter: blur(12px);
      font-weight: 900;
      font-size: 13px;
      user-select:none;
    }
    .lb-close{ right: 12px; }
    .lb-prev{ left: 12px; top: 50%; transform: translateY(-50%); }
    .lb-next{ right: 12px; top: 50%; transform: translateY(-50%); }
  </style>
</head>
<body>
  <audio id="bgm" src="assets/music.mp3" loop preload="auto"></audio>
  <button id="musicBtn" class="music-btn" onclick="toggleMusic()">▶ Music</button>

  <div class="center">
    <div class="shell">
      <div class="card">
        <h1 class="h1">Our Journey 💗</h1>
        <p class="p">
          We were kids who didn’t know what love was.
          But somehow… we kept choosing each other.
        </p>

        <div class="tl" id="timeline"></div>

        <div class="row">
          <a class="btn" href="birthday.html">← Back</a>
          <a class="btn btn-solid" href="reasons.html">Next: 23 Reasons →</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" aria-hidden="true">
    <div class="lb-card">
      <button class="lb-btn lb-close" id="lbClose">✕ Close</button>
      <button class="lb-btn lb-prev" id="lbPrev">←</button>
      <button class="lb-btn lb-next" id="lbNext">→</button>

      <div class="lb-img">
        <img id="lbImg" alt="memory"/>
      </div>
      <div class="lb-meta">
        <div class="lb-title" id="lbTitle"></div>
        <div class="lb-sub" id="lbSub"></div>
      </div>
    </div>
  </div>

  <script src="images/app.js"></script>
  <script>
    // Put your real photos inside assets/photos/
    const timeline = [
      {
        title: "📍 Grade 9",
        text: "We didn’t know this was forever.",
        joke: "We were really shy to even see each other face to face.",
        photo: "images/1.jpeg"
      },
      {
        title: "📍 First Photo",
        text: "We really looked cute together.",
        joke: "We finally could face each other and capture our memories.",
        photo: "images/2.jpg"
      },
      {
        title: "📍 First Football Match",
        text: "We watched the match from the same stand together and our team won.",
        joke: "We watched it with the fear that someone else will find out.",
        photo: "images/3.jpg"
      },
      {
        title: "📍 +2 Phase",
        text: "We used to meet at 6 AM. Not scared to walk alone even at 4 AM (lol).",
        joke: "Scared but energized and peaceful memories with you.",
        photo: "images/4.png"
      },
      {
        title: "📍 Bachelor Struggles",
        text: "Many friends came and went. Many fights happened, but we fixed it.",
        joke: "Too many toxic people revealed their colors.",
        photo: "images/5.jpg"
      },
      {
        title: "📍 The Moment I Knew",
        text: "You weren’t a chapter. You were the story.",
        joke: "Even if we block, unblock, fight… we want each other the next day. We’re made for each other.",
        photo: "images/6.jpg"
      }
    ];

    const container = document.getElementById("timeline");

    function renderTimeline(){
      container.innerHTML = "";
      timeline.forEach((t, i) => {
        const item = document.createElement("div");
        item.className = "tl-item";
        item.innerHTML = `
          <div class="tl-img" data-i="${i}">
            <img src="${t.photo}" alt="${t.title}" onerror="this.style.display='none'">
          </div>
          <div>
            <div class="tl-title">${t.title}</div>
            <div class="tl-text">${t.text}</div>
            <div class="tl-joke">${t.joke}</div>
          </div>
        `;
        container.appendChild(item);
      });

      // Click handlers for images
      container.querySelectorAll(".tl-img").forEach((el) => {
        el.addEventListener("click", () => openLightbox(Number(el.dataset.i)));
      });
    }

    // Lightbox logic
    const lb = document.getElementById("lightbox");
    const lbImg = document.getElementById("lbImg");
    const lbTitle = document.getElementById("lbTitle");
    const lbSub = document.getElementById("lbSub");
    const lbClose = document.getElementById("lbClose");
    const lbPrev = document.getElementById("lbPrev");
    const lbNext = document.getElementById("lbNext");

    let idx = 0;

    function openLightbox(i){
      idx = i;
      const t = timeline[idx];
      lbImg.src = t.photo;
      lbTitle.textContent = t.title;
      lbSub.textContent = t.text + " " + t.joke;
      lb.classList.add("show");
      lb.setAttribute("aria-hidden", "false");
    }

    function closeLightbox(){
      lb.classList.remove("show");
      lb.setAttribute("aria-hidden", "true");
      lbImg.src = "";
    }

    function prev(){
      idx = (idx - 1 + timeline.length) % timeline.length;
      openLightbox(idx);
    }

    function next(){
      idx = (idx + 1) % timeline.length;
      openLightbox(idx);
    }

    lbClose.addEventListener("click", closeLightbox);
    lbPrev.addEventListener("click", prev);
    lbNext.addEventListener("click", next);

    lb.addEventListener("click", (e) => {
      if (e.target === lb) closeLightbox();
    });

    document.addEventListener("keydown", (e) => {
      if (!lb.classList.contains("show")) return;
      if (e.key === "Escape") closeLightbox();
      if (e.key === "ArrowLeft") prev();
      if (e.key === "ArrowRight") next();
    });

    renderTimeline();
  </script>
</body>

</html>
