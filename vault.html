<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Memory Vault</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💖</text></svg>">
  <link rel="stylesheet" href="images/style.css"/>
  <style>
    .vaultWrap{ margin-top: 18px; }
    .vaultBox{
      margin-top: 14px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.18);
      overflow: hidden;
    }
    .vaultImg{
      width: 100%;
      height: min(60vh, 520px);
      display:flex;
      align-items:center;
      justify-content:center;
      background: rgba(255,255,255,0.06);
    }
    .vaultImg img{
      width: 100%;
      height: 100%;
      object-fit: contain;
      display:block;
    }
    .vaultMeta{
      padding: 14px 14px 16px;
      text-align: left;
    }
    .vaultTitle{
      font-weight: 900;
      font-size: 18px;
    }
    .vaultCap{
      margin-top: 6px;
      color: rgba(255,255,255,0.78);
      line-height: 1.6;
      font-size: 14px;
    }
    .vaultNav{
      display:flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .pill{
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.25);
      color: rgba(255,255,255,0.9);
      padding: 10px 12px;
      border-radius: 999px;
      cursor:pointer;
      font-weight: 900;
      font-size: 13px;
    }
    .pill:hover{ background: rgba(255,255,255,0.06); }
    .hint{
      margin-top: 10px;
      font-size: 12px;
      color: rgba(255,255,255,0.62);
      text-align: left;
    }
  </style>
</head>
<body>
  <audio id="bgm" src="assets/music.mp3" loop preload="auto"></audio>
  <!-- <button id="musicBtn" class="music-btn" onclick="toggleMusic()">▶ Music</button> -->

  <div class="center">
    <div class="shell">
      <div class="card">
        <h1 class="h1">Memory Vault</h1>
        <p class="p">
          Little pieces of us, saved gently.
        </p>

        <div class="vaultWrap">
          <div class="row">
            <button class="btn btn-solid" id="openVaultBtn">🔐 Open our Memory Vault</button>
          </div>

          <div id="vaultArea" class="fade" style="display:none;">
            <div class="vaultBox">
              <div class="vaultImg">
                <img id="vaultImg" alt="memory" />
              </div>
              <div class="vaultMeta">
                <div class="vaultTitle" id="vaultTitle"></div>
                <div class="vaultCap" id="vaultCap"></div>

                <div class="vaultNav">
                  <button class="pill" id="prevBtn">← Previous</button>
                  <button class="pill" id="nextBtn">Next →</button>
                  <button class="pill" id="openFullBtn">Open full image</button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="row">
          <a class="btn" href="what-if.html">← Back</a>
          <a class="btn btn-solid" href="future.html">Next: Future →</a>
        </div>
      </div>
    </div>
  </div>

  <script src="images/app.js"></script>
  <script>
    // Replace these with your real memories (file + title + caption)
    // Put images in: assets/vault/1.jpg, 2.jpg...
    const memories = [
      {
        file: "images/66.jpg",
        title: "Our early days",
        caption: "We were shy, but we were real. And we kept showing up."
      },
      {
        file: "images/7.jpg",
        title: "A screenshot I’ll never delete",
        caption: "I will definitely marry you."
      },
      {
        file: "images/8.jpg",
        title: "A moment that still feels warm",
        caption: "Even small memories with you feel big to me."
      },
      {
        file: "images/9.gif",
        title: "So cute and elegant.",
        caption: "I miss creating GIFs."
      },
      {
        file: "images/10.gif",
        title: "Ngl, I miss your kisses videos!",
        caption: "I feel special when you make me feel you are proud having me."
      },
      {
        file: "images/11.jpg",
        title: "Nature with you feels AWWWWW!",
        caption: "Let's go to Godawari soon."
      },
      {
        file: "images/12.jpg",
        title: "What a great Hike it was!",
        caption: "Waiting for Hiking 2.0 to Manichud."
      },
      {
        file: "images/13.jpeg",
        title: "Lhaso Fyafula!!",
        caption: "When are we going to Mustang together?"
      },
      {
        file: "images/14.jpg",
        title: "Will you be mine?",
        caption: "I am asking for real!"
      }
    ];

    const openBtn = document.getElementById("openVaultBtn");
    const area = document.getElementById("vaultArea");

    const img = document.getElementById("vaultImg");
    const title = document.getElementById("vaultTitle");
    const cap = document.getElementById("vaultCap");

    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const openFullBtn = document.getElementById("openFullBtn");

    let i = 0;

    function render(){
      const m = memories[i];
      img.src = m.file;
      title.textContent = m.title;
      cap.textContent = m.caption;
      openFullBtn.onclick = () => window.open(m.file, "_blank");
    }

    function prev(){
      i = (i - 1 + memories.length) % memories.length;
      render();
    }

    function next(){
      i = (i + 1) % memories.length;
      render();
    }

    openBtn.addEventListener("click", () => {
      area.style.display = "block";
      showFade("vaultArea");
      render();
    });

    prevBtn.addEventListener("click", prev);
    nextBtn.addEventListener("click", next);

    document.addEventListener("keydown", (e) => {
      if (area.style.display !== "block") return;
      if (e.key === "ArrowLeft") prev();
      if (e.key === "ArrowRight") next();
    });
  </script>
</body>

</html>
